<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartes mentales — DCG UE5</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0f0f13;
      --surface: #1a1a22;
      --surface2:#22222e;
      --border:  #2e2e3e;
      --accent:  #c9a96e;
      --text:    #e8e6f0;
      --muted:   #888098;
      --radius:  16px;
      --shadow:  0 8px 40px rgba(0,0,0,.5);

      --t1: #c9a96e;
      --t2: #5ecb8a;
      --t3: #e06b6b;
      --t4: #8b6fd4;
      --t5: #5aafd4;
      --t6: #d46f8b;
      --t7: #6fb86f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .header-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .header-title { font-size: .82rem; font-weight: 500; color: var(--text); }
    .subtitle { font-size: .72rem; color: var(--muted); }
    .back-btn {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .72rem; cursor: pointer; text-decoration: none;
      transition: all .15s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── LAYOUT ── */
    .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; min-width: 180px;
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 12px 0; flex-shrink: 0;
    }
    .sidebar-title {
      font-size: .63rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px; padding: 0 16px 10px;
    }
    .theme-btn {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 8px 16px;
      background: none; border: none; border-left: 3px solid transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .76rem; text-align: left; cursor: pointer; transition: all .15s;
    }
    .theme-btn:hover { color: var(--text); background: var(--surface2); }
    .theme-btn.active { color: var(--text); background: var(--surface2); font-weight: 500; }
    .theme-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .theme-btn .cbadge {
      margin-left: auto; font-size: .62rem;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); padding: 1px 6px; border-radius: 20px; flex-shrink: 0;
    }
    .theme-btn.active .cbadge { background: rgba(201,169,110,.12); border-color: rgba(201,169,110,.25); color: var(--accent); }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .controls-bar {
      padding: 8px 20px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); background: var(--surface);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .current-theme-label {
      font-family: 'Playfair Display', serif; font-size: .88rem;
      font-weight: 600; color: var(--text); flex: 1; min-width: 140px;
    }
    .count-badge {
      font-size: .7rem; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }
    .search-input {
      padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .76rem;
      outline: none; transition: border-color .15s; width: 180px;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    /* ── GRID ── */
    .grid-wrap { flex: 1; overflow-y: auto; padding: 20px; }

    .grid-section-title {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; margin-top: 28px;
    }
    .grid-section-title:first-child { margin-top: 0; }
    .section-bar { width: 3px; height: 22px; border-radius: 2px; flex-shrink: 0; }
    .section-label { font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; }
    .section-name { font-family: 'Playfair Display', serif; font-size: .95rem; font-weight: 600; color: var(--text); flex: 1; }
    .section-count { font-size: .65rem; color: var(--muted); letter-spacing: .08em; }

    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 8px;
    }

    /* ── CARD ── */
    .chapter-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease, border-color .2s;
    }
    .chapter-card:hover { transform: translateY(-4px); box-shadow: 0 14px 35px rgba(0,0,0,.45); }
    .chapter-card:hover .ch-arrow { transform: translate(3px,-3px); }

    .card-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--surface2); }
    .card-thumb-placeholder {
      width: 100%; aspect-ratio: 4/3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; background: var(--surface2); color: var(--border); font-size: 1.8rem;
    }
    .card-thumb-placeholder span { font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; color: var(--muted); }

    .card-body { padding: 10px 12px 10px; }
    .ch-num { font-size: .6rem; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
    .ch-title { font-family: 'Playfair Display', serif; font-size: .84rem; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 8px; }
    .ch-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 7px; }
    .ch-theme-pill { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; font-weight: 500; border: 1px solid; opacity: .85; }
    .ch-arrow { font-size: .85rem; color: var(--muted); transition: transform .2s ease; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .28s ease;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lb-backdrop { position: absolute; inset: 0; background: rgba(5,5,10,.88); backdrop-filter: blur(8px); }
    .lb-panel {
      position: relative; z-index: 2;
      max-width: min(92vw, 1100px); max-height: 92vh; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column;
      transform: scale(.96) translateY(8px); transition: transform .28s ease;
      box-shadow: var(--shadow);
    }
    .lightbox.active .lb-panel { transform: scale(1) translateY(0); }

    .lb-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface2);
    }
    .lb-num { font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .lb-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .lb-close {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
      padding: 4px 10px; border-radius: 8px; line-height: 1;
      transition: all .15s; font-family: 'DM Sans', sans-serif;
    }
    .lb-close:hover { border-color: var(--accent); color: var(--accent); }

    /* Zoom buttons */
    .lb-zoom-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem; cursor: pointer;
      padding: 4px 10px; border-radius: 8px; line-height: 1;
      transition: all .15s; font-family: 'DM Sans', sans-serif;
      min-width: 32px;
    }
    .lb-zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
    .lb-zoom-level {
      font-size: .7rem; color: var(--muted); min-width: 38px;
      text-align: center; letter-spacing: .05em;
    }

    .lb-img-wrap {
      flex: 1; overflow: auto;
      padding: 20px; min-height: 0; background: var(--bg);
      cursor: grab;
    }
    .lb-img-wrap:active { cursor: grabbing; }

    .lb-img {
      border-radius: 8px; display: block;
      flex-shrink: 0;
      width: 100%;
      height: auto;
      max-width: none;
    }

    .lb-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--border); font-size: 3rem; min-height: 260px; }
    .lb-placeholder p { font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    .lb-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 16px; border-top: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface2);
      gap: 8px; flex-wrap: wrap;
    }
    .lb-nav-left, .lb-nav-right { display: flex; align-items: center; gap: 6px; }
    .lb-nav-btn {
      padding: 5px 13px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: .72rem;
      cursor: pointer; transition: all .15s;
    }
    .lb-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .lb-nav-btn:disabled { opacity: .28; cursor: not-allowed; }
    .lb-counter { font-size: .72rem; color: var(--muted); letter-spacing: .08em; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .chapters-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .search-input { width: 130px; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="header-logo">DCG · UE5</a>
  <div class="header-sep"></div>
  <span class="header-title">Cartes mentales</span>
  <span class="subtitle">18 chapitres · 7 thèmes</span>
  <a href="https://dcgnancy.github.io" class="back-btn">← Accueil</a>
</header>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-title">Thèmes</div>
    <button class="theme-btn active" data-theme="all" onclick="filterTheme('all',this)">
      <div class="theme-dot" style="background:var(--accent)"></div>
      Tous les chapitres
      <span class="cbadge">18</span>
    </button>
    <div class="sidebar-divider"></div>
    <button class="theme-btn" data-theme="1" onclick="filterTheme('1',this)">
      <div class="theme-dot" style="background:var(--t1)"></div>
      Thème 1 · Fondements
      <span class="cbadge">2</span>
    </button>
    <button class="theme-btn" data-theme="2" onclick="filterTheme('2',this)">
      <div class="theme-dot" style="background:var(--t2)"></div>
      Thème 2 · Marchés
      <span class="cbadge">2</span>
    </button>
    <button class="theme-btn" data-theme="3" onclick="filterTheme('3',this)">
      <div class="theme-dot" style="background:var(--t3)"></div>
      Thème 3 · Financement
      <span class="cbadge">2</span>
    </button>
    <button class="theme-btn" data-theme="4" onclick="filterTheme('4',this)">
      <div class="theme-dot" style="background:var(--t4)"></div>
      Thème 4 · Croissance
      <span class="cbadge">3</span>
    </button>
    <button class="theme-btn" data-theme="5" onclick="filterTheme('5',this)">
      <div class="theme-dot" style="background:var(--t5)"></div>
      Thème 5 · Régulation pub.
      <span class="cbadge">3</span>
    </button>
    <button class="theme-btn" data-theme="6" onclick="filterTheme('6',this)">
      <div class="theme-dot" style="background:var(--t6)"></div>
      Thème 6 · Déséquilibres
      <span class="cbadge">3</span>
    </button>
    <button class="theme-btn" data-theme="7" onclick="filterTheme('7',this)">
      <div class="theme-dot" style="background:var(--t7)"></div>
      Thème 7 · Mondialisation
      <span class="cbadge">3</span>
    </button>
  </aside>

  <main class="main">
    <div class="controls-bar">
      <span class="current-theme-label" id="currentThemeLabel">Tous les chapitres</span>
      <span class="count-badge" id="countBadge">18 cartes</span>
      <input class="search-input" type="text" placeholder="🔍  Rechercher…" id="searchInput" oninput="applySearch()">
    </div>
    <div class="grid-wrap" id="gridWrap"></div>
  </main>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <div class="lb-panel">
    <div class="lb-header">
      <div>
        <div class="lb-num" id="lbNum"></div>
        <div class="lb-title" id="lbTitle"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="lb-zoom-btn" id="lbZoomOut" title="Dézoomer">−</button>
        <span class="lb-zoom-level" id="lbZoomLevel">100%</span>
        <button class="lb-zoom-btn" id="lbZoomIn" title="Zoomer">+</button>
        <button class="lb-zoom-btn" id="lbZoomFit" title="Ajuster à l'écran" style="font-size:.7rem;padding:4px 8px">Ajuster</button>
        <button class="lb-close" id="lbClose">✕</button>
      </div>
    </div>
    <div class="lb-img-wrap fit-mode" id="lbImgWrap"></div>
    <div class="lb-nav">
      <div class="lb-nav-left">
        <button class="lb-nav-btn" id="lbPrev">← Précédent</button>
      </div>
      <span class="lb-counter" id="lbCounter"></span>
      <div class="lb-nav-right">
        <button class="lb-nav-btn" id="lbNext">Suivant →</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DONNÉES — modifiez "img" avec vos chemins PNG
   Convention : cartes-mentales/ch01.png … ch18.png
═══════════════════════════════════════════ */
const THEMES = [
  { id:'1', colorHex:'#c9a96e', label:'Thème 1', name:'Appréhender les fondements de l\'activité économie', chapters:[
    { num:1,  title:'La science économique : acteurs, fonctions et création de richesse', img:'cartes-mentales/ch01.png' },
    { num:2,  title:'Histoire économique : faits et courants de pensée',                  img:'cartes-mentales/ch02.png' },
  ]},
  { id:'2', colorHex:'#5ecb8a', label:'Thème 2', name:'Comprendre le fonctionnement des marchés', chapters:[
    { num:3,  title:'Le fonctionnement du marché concurrentiel',                                                     img:'cartes-mentales/ch03.png' },
    { num:4,  title:'Les limites du fonctionnement concurrentiel : concurrence imparfaite et défaillances de marché', img:'cartes-mentales/ch04.png' },
  ]},
  { id:'3', colorHex:'#e06b6b', label:'Thème 3', name:'Identifier les opérations de financement', chapters:[
    { num:5,  title:'L\'épargne et l\'investissement',            img:'cartes-mentales/ch05.png' },
    { num:6,  title:'Les circuits de financement de l\'économie', img:'cartes-mentales/ch06.png' },
  ]},
  { id:'4', colorHex:'#8b6fd4', label:'Thème 4', name:'Identifier les enjeux de la croissance économique', chapters:[
    { num:7,  title:'La mesure de la croissance économique',                   img:'cartes-mentales/ch07.png' },
    { num:8,  title:'Les déterminants de la croissance économique',            img:'cartes-mentales/ch08.png' },
    { num:9,  title:'La croissance économique : finalités, limites et enjeux', img:'cartes-mentales/ch09.png' },
  ]},
  { id:'5', colorHex:'#5aafd4', label:'Thème 5', name:'Analyser la régulation publique', chapters:[
    { num:10, title:'Les rôles de l\'État et son action publique',  img:'cartes-mentales/ch10.png' },
    { num:11, title:'Les politiques économiques',                   img:'cartes-mentales/ch11.png' },
    { num:12, title:'Le cadre européen des politiques économiques', img:'cartes-mentales/ch12.png' },
  ]},
  { id:'6', colorHex:'#d46f8b', label:'Thème 6', name:'Analyser les déséquilibres sociaux et leur régulation', chapters:[
    { num:13, title:'Le fonctionnement du marché du travail et ses déséquilibres',   img:'cartes-mentales/ch13.png' },
    { num:14, title:'Les politiques d\'ajustement du marché du travail',              img:'cartes-mentales/ch14.png' },
    { num:15, title:'Les politiques de redistribution face aux inégalités sociales',  img:'cartes-mentales/ch15.png' },
  ]},
  { id:'7', colorHex:'#6fb86f', label:'Thème 7', name:'Identifier les effets et les enjeux de la mondialisation des économies', chapters:[
    { num:16, title:'Les transformations du commerce mondial',        img:'cartes-mentales/ch16.png' },
    { num:17, title:'Les politiques commerciales et d\'attractivité', img:'cartes-mentales/ch17.png' },
    { num:18, title:'La régulation mondiale et ses limites',          img:'cartes-mentales/ch18.png' },
  ]},
];

const ALL = THEMES.flatMap(t => t.chapters.map(ch => ({ ...ch, theme: t })));

let activeTheme = 'all', searchQ = '', lbIdx = 0;

function filtered() {
  return ALL.filter(ch => {
    const themeOk = activeTheme === 'all' || ch.theme.id === activeTheme;
    const q = searchQ.toLowerCase();
    const searchOk = !q || ch.title.toLowerCase().includes(q) || String(ch.num).includes(q);
    return themeOk && searchOk;
  });
}

function renderGrid() {
  const wrap = document.getElementById('gridWrap');
  wrap.innerHTML = '';
  const list = filtered();
  document.getElementById('countBadge').textContent = `${list.length} carte${list.length > 1 ? 's' : ''}`;

  if (!list.length) {
    wrap.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-size:.85rem">Aucun résultat</div>`;
    return;
  }

  const byTheme = {};
  list.forEach(ch => {
    const tid = ch.theme.id;
    if (!byTheme[tid]) byTheme[tid] = { theme: ch.theme, chapters: [] };
    byTheme[tid].chapters.push(ch);
  });

  Object.values(byTheme).forEach(({ theme, chapters }) => {
    const sec = document.createElement('div');
    sec.className = 'grid-section-title';
    sec.innerHTML = `
      <div class="section-bar" style="background:${theme.colorHex}"></div>
      <span class="section-label" style="color:${theme.colorHex}">${theme.label}</span>
      <span class="section-name">${theme.name}</span>
      <span class="section-count">${chapters.length} ch.</span>
    `;
    wrap.appendChild(sec);

    const grid = document.createElement('div');
    grid.className = 'chapters-grid';

    chapters.forEach(ch => {
      const idx = ALL.findIndex(c => c.num === ch.num);
      const card = document.createElement('div');
      card.className = 'chapter-card';
      card.innerHTML = `
        ${ch.img ? `<img class="card-thumb" src="${ch.img}" alt="Carte mentale ch.${ch.num}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="card-thumb-placeholder" style="${ch.img ? 'display:none' : ''}">🗺️<span>À venir</span></div>
        <div class="card-body">
          <div class="ch-num">Chapitre ${ch.num}</div>
          <div class="ch-title">${ch.title}</div>
          <div class="ch-footer">
            <span class="ch-theme-pill" style="color:${theme.colorHex};border-color:${theme.colorHex}44;background:${theme.colorHex}18">${theme.label}</span>
            <span class="ch-arrow">↗</span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openLightbox(idx));
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
  });
}

function filterTheme(id, btn) {
  activeTheme = id;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { all:'Tous les chapitres', 1:'Thème 1 · Fondements', 2:'Thème 2 · Marchés', 3:'Thème 3 · Financement', 4:'Thème 4 · Croissance', 5:'Thème 5 · Régulation publique', 6:'Thème 6 · Déséquilibres sociaux', 7:'Thème 7 · Mondialisation' };
  document.getElementById('currentThemeLabel').textContent = labels[id] || '';
  renderGrid();
}

function applySearch() { searchQ = document.getElementById('searchInput').value; renderGrid(); }

/* ── ZOOM ── */
let zoomLevel = 1;
const ZOOM_STEP = 0.25;
const ZOOM_MIN  = 0.5;
const ZOOM_MAX  = 3;

function setZoom(z) {
  zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z));
  const img  = document.querySelector('#lbImgWrap .lb-img');
  const wrap = document.getElementById('lbImgWrap');
  if (!img) return;
  img.style.width  = (zoomLevel * 100) + '%';
  img.style.height = 'auto';
  wrap.scrollTop = 0;
  document.getElementById('lbZoomLevel').textContent = Math.round(zoomLevel * 100) + '%';
}

function openLightbox(idx) {
  lbIdx = idx;
  zoomLevel = 1;
  const ch = ALL[idx];
  document.getElementById('lbNum').textContent     = `Chapitre ${ch.num} · ${ch.theme.label}`;
  document.getElementById('lbTitle').textContent   = ch.title;
  document.getElementById('lbCounter').textContent = `${idx + 1} / ${ALL.length}`;
  document.getElementById('lbPrev').disabled = idx === 0;
  document.getElementById('lbNext').disabled = idx === ALL.length - 1;

  const wrap = document.getElementById('lbImgWrap');
  if (ch.img) {
    wrap.innerHTML = `<img class="lb-img" src="${ch.img}" alt="Carte mentale ch.${ch.num}" style="width:100%;height:auto">`;
  } else {
    wrap.innerHTML = `<div class="lb-placeholder">🗺️<p>Image à venir</p></div>`;
  }
  wrap.scrollTop = 0;
  wrap.scrollLeft = 0;
  document.getElementById('lbZoomLevel').textContent = '100%';
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbBackdrop').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => { if (lbIdx > 0) openLightbox(lbIdx - 1); });
document.getElementById('lbNext').addEventListener('click', () => { if (lbIdx < ALL.length - 1) openLightbox(lbIdx + 1); });
document.getElementById('lbZoomIn').addEventListener('click',  () => setZoom(zoomLevel + ZOOM_STEP));
document.getElementById('lbZoomOut').addEventListener('click', () => setZoom(zoomLevel - ZOOM_STEP));
document.getElementById('lbZoomFit').addEventListener('click', () => setZoom(1));

/* Zoom molette dans la lightbox */
document.getElementById('lbImgWrap').addEventListener('wheel', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  e.preventDefault();
  setZoom(zoomLevel + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
}, { passive: false });

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft'  && lbIdx > 0)              openLightbox(lbIdx - 1);
  if (e.key === 'ArrowRight' && lbIdx < ALL.length - 1) openLightbox(lbIdx + 1);
  if (e.key === '+' || e.key === '=') setZoom(zoomLevel + ZOOM_STEP);
  if (e.key === '-')                  setZoom(zoomLevel - ZOOM_STEP);
});

renderGrid();
</script>
</body>
</html>
